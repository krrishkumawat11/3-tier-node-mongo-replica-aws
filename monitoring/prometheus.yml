# ─────────────────────────────────────────
# Global Configuration
# ─────────────────────────────────────────
global:
  scrape_interval: 5s         # Har 5 second mein metrics collect karo
  evaluation_interval: 5s     # Har 5 second mein rules evaluate karo
  scrape_timeout: 4s          # Agar 4s mein response nahi aaya toh timeout

# ─────────────────────────────────────────
# Alertmanager Configuration
# ─────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Future mein alertmanager add karna ho toh:
          # - targets: ["alertmanager:9093"]

# ─────────────────────────────────────────
# Rule Files (Alerting & Recording Rules)
# ─────────────────────────────────────────
rule_files: []
  # Future mein rules add karna ho toh:
  # - "rules/alert_rules.yml"
  # - "rules/recording_rules.yml"

# ─────────────────────────────────────────
# Scrape Configurations
# ─────────────────────────────────────────
scrape_configs:

  # Prometheus khud ko monitor karta hai
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # MongoDB Metrics — Percona MongoDB Exporter
  - job_name: "mongodb"
    static_configs:
      - targets: ["mongo-exporter:9216"]
    metric_relabel_configs:
      - target_label: env
        replacement: "production"

  # System Metrics — Node Exporter (CPU, RAM, Disk, Network)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          env: "production"
